name: roadrobos
description: "RoadRobos - Vehicle Service & Ride Booking App"
publish_to: 'none'
version: 1.0.4+8

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # ── Navigation ──────────────────────────────────────────────────────────────
  go_router: ^13.0.0

  # ── State Management ────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.5

  # ── Animations ──────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── UI Components ───────────────────────────────────────────────────────────
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1   # Disk image cache for AppNetworkImage
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0
  qr_flutter: ^4.1.0              # Real QR code rendering for 2FA TOTP setup

  # ── Icons ────────────────────────────────────────────────────────────────────
  flutter_svg: ^2.0.10
  iconsax: ^0.0.8
  flutter_local_notifications: ^17.0.0

  # ── Utils ────────────────────────────────────────────────────────────────────
  gap: ^3.0.1
  fl_chart: ^0.68.0
  intl: ^0.20.2
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  lottie: ^3.1.2
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.0
  latlong2: ^0.9.1
  http: ^1.2.1
  geolocator: ^11.0.0
  js: ^0.6.7
  confetti: ^0.7.0
  crypto: ^3.0.3                  # SHA-256 for cache key hashing (N3)
  uuid: ^4.3.3                    # UUID v4 for idempotency keys (N5)

  # ── Network ──────────────────────────────────────────────────────────────────
  dio: ^5.4.0                     # Retry/Auth/Logging interceptors (N1)

  # ── Firebase ─────────────────────────────────────────────────────────────────
  firebase_core: ^3.9.0
  supabase_flutter: ^2.8.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0

  # ── Auth ─────────────────────────────────────────────────────────────────────
  google_sign_in: ^6.2.0

  # ── Payments ─────────────────────────────────────────────────────────────────
  razorpay_flutter: ^1.3.7

  # ── Local storage & config ────────────────────────────────────────────────────
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0

  # ── Invoicing & Sharing ──────────────────────────────────────────────────────
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^10.1.0
  path_provider: ^2.1.2
  rxdart: ^0.28.0

  # ── Offline Persistence (pinned — no 'any') ───────────────────────────────────
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.25
  path: ^1.9.0
  connectivity_plus: ^6.0.3
  mutex: ^3.1.0

  # ── Security & Encryption ────────────────────────────────────────────────────
  pointycastle: ^3.9.1            # AES-256-GCM for SQLite column encryption (E1)
  cryptography: ^2.7.0            # X25519 + AES-256-GCM for chat E2E (E5)
  flutter_jailbreak_detection: ^1.9.0  # Uncomment to enable root detection (S3)

  # ── Misc ─────────────────────────────────────────────────────────────────────
  flutter_image_compress: ^2.4.0
  screen_protector: ^1.5.2
  sentry_flutter: ^8.0.0
  in_app_update: ^4.2.5
  upgrader: ^13.5.0
  firebase_in_app_messaging: ^0.8.1+10
  flutter_background_service: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.0
  mocktail: ^1.0.4
  # Drift code generation (pinned)
  drift_dev: ^2.20.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_ios_version: "12.0"
  remove_alpha_ios: true  # Apple App Store rejects icons with alpha channel
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#2E7D32"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/app_icon.png"
  android: true
  ios: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/app_icon.png
    - assets/signin_icon.png
    - assets/rentals/
