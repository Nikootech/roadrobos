name: roadrobos
description: "RoadRobos - Vehicle Service & Ride Booking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  # Navigation
  go_router: ^13.0.0
  # State Management
  flutter_riverpod: ^2.5.0
  # Animations
  flutter_animate: ^4.5.0
  # UI Components
  google_fonts: ^6.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^5.0.0
  # Icons
  flutter_svg: ^2.0.10
  iconsax: ^0.0.8
  flutter_local_notifications: ^17.0.0
  # Utils
  gap: ^3.0.1
  fl_chart: ^0.68.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  lottie: ^3.1.2
  flutter_map: ^7.0.2
  flutter_map_cancellable_tile_provider: ^3.0.0
  latlong2: ^0.9.1
  http: ^1.2.1
  geolocator: ^11.0.0
  confetti: ^0.7.0
  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  firebase_messaging: ^15.2.0
  firebase_analytics: ^11.4.0
  firebase_crashlytics: ^4.3.0
  # Auth providers
  google_sign_in: ^6.2.0
  # Payments
  razorpay_flutter: ^1.3.7
  # Local storage & config
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.2.0
  flutter_dotenv: ^5.2.1
  # Invoicing & Sharing
  pdf: ^3.10.8
  printing: ^5.11.1
  share_plus: ^10.1.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#2E7D32"

# No overlaps needed

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/app_icon.png
    - assets/signin_icon.png
    - assets/rentals/
    - .env

