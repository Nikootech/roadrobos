name: Deploy Web to Vercel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create .dart_defines file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .dart_defines
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .dart_defines
          echo "RAZORPAY_KEY_ID=${{ secrets.RAZORPAY_KEY_ID }}" >> .dart_defines
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .dart_defines
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> .dart_defines
          echo "ENV=prod" >> .dart_defines

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web Release
        run: flutter build web --release --dart-define-from-file=.dart_defines --no-tree-shake-icons

      - name: Check for Vercel Secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "⚠️ WARNING: Vercel credentials are not set in GitHub secrets. Skiping Vercel CLI deployment."
            echo "Note: If you linked this repo directly in the Vercel Dashboard, Vercel will still deploy automatically."
          else
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.check_secrets.outputs.has_secrets == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
          vercel-project-name: 'roadrobos'
