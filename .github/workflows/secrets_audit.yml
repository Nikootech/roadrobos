name: Secrets Audit

on:
  push:
    branches: [ "main", "release/*" ]
  pull_request:
    branches: [ "main", "release/*" ]

jobs:
  audit_secrets:
    name: Pre-release Secrets Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run grep for hardcoded secrets
        run: |
          echo "Starting secrets audit..."
          
          # We use grep with PCRE (-P) or extended regex (-E) to search the repository.
          # We exclude the .github folder and known documentation/template files where placeholders might exist.
          
          # Pattern 1: Supabase production URL (only real project refs, not template placeholders)
          SUPABASE_PATTERN="https://[a-z]{20}\.supabase\.co"
          
          # Pattern 2: Razorpay live keys only (rzp_live_ with realistic key body)
          RAZORPAY_PATTERN="rzp_live_[A-Za-z0-9]{14,}"
          
          # Pattern 3: FCM server key prefix (AAAA)
          FCM_PATTERN="AAAA[A-Za-z0-9_-]{30,}:"
          
          # Pattern 4: Google API key prefix (AIza) - 39 chars total
          GOOGLE_API_PATTERN="AIza[A-Za-z0-9_-]{35}"
          
          # We build the combined regex
          COMBINED_PATTERN="$SUPABASE_PATTERN|$RAZORPAY_PATTERN|$FCM_PATTERN|$GOOGLE_API_PATTERN"
          
          # Run grep. If it finds anything, it exits with 0. If it finds nothing, it exits with 1.
          # We want to FAIL if we find something (exit 0) and PASS if we find nothing (exit 1).
          
          set +e # Don't fail immediately on exit 1
          
          RESULTS=$(grep -rE "$COMBINED_PATTERN" . \
            --exclude-dir=".git" \
            --exclude-dir=".github" \
            --exclude-dir="build" \
            --exclude-dir=".dart_tool" \
            --exclude-dir="flutter" \
            --exclude="*.md" \
            --exclude=".env*" \
            --exclude="*.template" \
            --exclude="*.example.*" \
            --exclude="google-services.json" \
            --exclude="GoogleService-Info.plist" \
            --exclude="pubspec.lock")
          
          EXIT_CODE=$?
          
          set -e # Re-enable failing on errors
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "::error::Secrets found in the codebase!"
            echo "$RESULTS"
            echo "Please move these to environment files and use String.fromEnvironment()."
            exit 1
          else
            echo "No hardcoded secrets found. Passed."
            exit 0
          fi
